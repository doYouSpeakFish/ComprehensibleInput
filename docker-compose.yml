services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KOOG_API_KEY_FILE: /run/secrets/koog_api_key
      APP_API_KEY_FILE: /run/secrets/app_api_key
      BACKEND_DATABASE_URL: jdbc:postgresql://postgres:5432/comprehensible_input
      BACKEND_DATABASE_USER: comprehensible_app
      BACKEND_DATABASE_PASSWORD_FILE: /run/secrets/db_app_password
      BACKEND_DATABASE_ADMIN_USER: comprehensible_admin
      BACKEND_DATABASE_ADMIN_PASSWORD_FILE: /run/secrets/db_admin_password
    ports:
      - "8080:8080"
    secrets:
      - koog_api_key
      - app_api_key
      - db_app_password
      - db_admin_password

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comprehensible_input
      POSTGRES_USER: comprehensible_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_admin_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comprehensible_admin -d comprehensible_input"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    secrets:
      - db_admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

secrets:
  koog_api_key:
    file: ./compose-secrets/koog_api_key.txt
  app_api_key:
    file: ./compose-secrets/app_api_key.txt
  db_app_password:
    file: ./compose-secrets/db_app_password.txt
  db_admin_password:
    file: ./compose-secrets/db_admin_password.txt

volumes:
  postgres_data:
