name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-android:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup keystore file
        run: |
          echo $UPLOAD_KEYSTORE_PROPERTIES_BASE64 | base64 --decode > keystore.properties
          echo $UPLOAD_KEYSTORE_FILE_BASE64 | base64 --decode > upload-keystore.jks
          cat keystore.properties | sha256sum | echo "Keystore properties hash: $(cat)"
          cat upload-keystore.jks | sha256sum | echo "Keystore file hash: $(cat)"
        env:
          UPLOAD_KEYSTORE_FILE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_FILE_BASE64 }}
          UPLOAD_KEYSTORE_PROPERTIES_BASE64: ${{ secrets.UPLOAD_KEYSTORE_PROPERTIES_BASE64 }}

      - name: Add Google Services JSON
        run: |
          echo $GOOGLE_SERVICES_JSON > /app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android lint
        run: ./gradlew :app:lint

      - name: Run Detekt
        run: ./gradlew :app:detekt

      - name: Assemble with Gradle
        run: ./gradlew :app:assemble

      - name: Run tests with coverage
        run: ./gradlew :app:koverMarkdownSnapshotCheck

      - name: Add coverage report to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: mi-kas/kover-report@v1
        with:
          path: ${{ github.workspace }}/app/build/reports/kover/report.xml
          title: App Code Coverage
          update-comment: true

      - name: Upload screenshot diff artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: screenshot-diff
          path: app/build/outputs/roborazzi
          retention-days: 30

      - name: Upload screenshot diff reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: screenshot-diff-reports
          path: app/build/reports
          retention-days: 30

      - name: Upload screenshot diff test results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: screenshot-diff-test-results
          path: app/build/test-results
          retention-days: 30

      - name: Deliver android app via firebase
        # if: github.ref == 'refs/heads/main' disabled temporarily for testing
        run: |
          mkdir /service-account
          echo $GOOGLE_SERVICE_ACCOUNT_JSON > /service-account/service-account.json
          ./gradlew assembleRelease appDistributionUploadRelease
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

  build-and-test-backend:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew :backend:detekt

      - name: Assemble with Gradle
        run: ./gradlew :backend:assemble

      - name: Run tests with coverage
        run: ./gradlew :backend:koverMarkdownSnapshotCheck

      - name: Add coverage report to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: mi-kas/kover-report@v1
        with:
          path: ${{ github.workspace }}/backend/build/reports/kover/report.xml
          title: Backend Code Coverage
          update-comment: true

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-test-backend
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:comprehensible-input-ci
          version: latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          sudo chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Load Docker secrets
        run: |
          echo $KOOG_API_KEY > compose-secrets/koog_api_key.txt
          echo $BACKEND_API_KEY > compose-secrets/app_api_key.txt
          echo $DB_APP_PASSWORD > compose-secrets/db_app_password.txt
          echo $DB_ADMIN_PASSWORD > compose-secrets/db_admin_password.txt
        env:
          KOOG_API_KEY: ${{ secrets.KOOG_API_KEY }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          DB_APP_PASSWORD: ${{ secrets.DB_APP_PASSWORD }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: edwardsills/comprehensible-input

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: edwardsills/comprehensible-input:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy
        run: |
          docker context create prod --docker host=$BACKEND_HOST
          docker --context prod stack deploy -c docker-compose-prod.yml app --detach=true --with-registry-auth
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}

  auto-merge:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-android]
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
