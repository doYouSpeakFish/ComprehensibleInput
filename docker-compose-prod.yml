services:
  backend:
    image: edwardsills/comprehensible-input:latest
    depends_on:
      - postgres
    environment:
      KOOG_API_KEY_FILE: /run/secrets/koog_api_key
      APP_API_KEY_FILE: /run/secrets/app_api_key
      BACKEND_DATABASE_URL: jdbc:postgresql://postgres:5432/comprehensible_input
      BACKEND_DATABASE_USER: app
      BACKEND_DATABASE_PASSWORD_FILE: /run/secrets/db_app_password
      BACKEND_DATABASE_ADMIN_USER: admin
      BACKEND_DATABASE_ADMIN_PASSWORD_FILE: /run/secrets/db_admin_password
    ports:
      - "8080:8080"
    secrets:
      - koog_api_key
      - app_api_key
      - db_app_password
      - db_admin_password

  cloudflared:
    image: cloudflare/cloudflared:latest
    command:
      - tunnel
      - --no-autoupdate
      - run
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/cloudflared_tunnel_token
    restart: unless-stopped
    secrets:
      - cloudflared_tunnel_token

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: comprehensible_input
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_admin_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d comprehensible_input"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    secrets:
      - db_admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

secrets:
  koog_api_key:
    external: true
    name: app_koog_api_key
  app_api_key:
    external: true
    name: app_app_api_key
  db_app_password:
    external: true
    name: app_db_app_password
  db_admin_password:
    external: true
    name: app_db_admin_password
  cloudflared_tunnel_token:
    external: true
    name: app_cloudflared_tunnel_token

volumes:
  postgres_data:
