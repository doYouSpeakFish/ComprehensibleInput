name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # For workflow testing. To be removed.

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      actions: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Load docker secrets
        run: |
          echo $KOOG_API_KEY > compose-secrets/koog_api_key.txt
          echo $BACKEND_API_KEY > compose-secrets/app_api_key.txt
          echo $DB_APP_PASSWORD > compose-secrets/db_app_password.txt
          echo $DB_ADMIN_PASSWORD > compose-secrets/db_admin_password.txt
        env:
          KOOG_API_KEY: ${{ secrets.KOOG_API_KEY }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          DB_APP_PASSWORD: ${{ secrets.DB_APP_PASSWORD }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}

      - name: Run Detekt
        run: ./gradlew :backend:detekt

      - name: Assemble with Gradle
        run: ./gradlew :backend:assemble

      - name: Run tests with coverage
        run: ./gradlew :backend:koverMarkdownSnapshotCheck

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: edwardsills/comprehensible-input

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: edwardsills/comprehensible-input:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:comprehensible-input-ci
          version: latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          sudo chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy
        run: |
          docker context create prod --docker host=$BACKEND_HOST
          docker --context prod stack deploy -c docker-compose-prod.yml app --detach=true --with-registry-auth
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
